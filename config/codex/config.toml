[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.n8n-mcp]
command = "infisical"
args = [
  "run",
  "--env=dev",
  "--projectId=e0b2ef20-030d-4b67-a20a-073bd3b2945f",
  "--path=/MCP",
  "--",
  "docker",
  "run",
  "-i",
  "--rm",
  "--init",
  "-e", "MCP_MODE=stdio",
  "-e", "LOG_LEVEL=error",
  "-e", "DISABLE_CONSOLE_OUTPUT=true",
  "-e", "N8N_API_URL",
  "-e", "N8N_API_KEY",
  "ghcr.io/czlonkowski/n8n-mcp:latest"
]

